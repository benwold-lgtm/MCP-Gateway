apiVersion: apps/v1
kind: Deployment
metadata:
  name: device-mcp-gateway
  namespace: mcp-gateway
  labels:
    app.kubernetes.io/name: device-mcp-gateway
spec:
  # Gateway is stateless in distributed mode — scale freely.
  # Set registry.mode = "distributed" in configmap.yaml to enable.
  # 2 replicas matches the HPA's minReplicas (hpa.yaml) and gives the PDB
  # (minAvailable: 1) headroom to allow rolling updates / node drains.
  # In EMBEDDED mode set this to 1 (in-process pods, no shared state) and
  # remove the gateway HPA, which would otherwise scale you past a single owner.
  replicas: 2
  selector:
    matchLabels:
      app: device-mcp-gateway
  template:
    metadata:
      labels:
        app: device-mcp-gateway
      annotations:
        # Prometheus scrapes the dedicated metrics port, not the API port (8000).
        prometheus.io/scrape: "true"
        prometheus.io/port: "9100"
        prometheus.io/path: /metrics
    spec:
      # Give SSE streams time to drain before the pod is forcibly killed.
      # Adjust upward if clients hold very long-lived connections.
      terminationGracePeriodSeconds: 120
      # Spread replicas across nodes so a single node failure can't take out the
      # whole gateway tier (and so the PDB's minAvailable: 1 is actually meaningful).
      # "preferred" — won't block scheduling on a small/single-node test cluster.
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchLabels:
                    app: device-mcp-gateway
                topologyKey: kubernetes.io/hostname
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: gateway
          # Pin to an immutable digest or semantic tag in production — never ship :latest.
          # Example: ghcr.io/your-org/device-mcp-gateway:1.2.3
          image: device-mcp-gateway:latest
          imagePullPolicy: IfNotPresent
          # Container hardening. readOnlyRootFilesystem is safe because the
          # distributed-mode gateway writes only to /app/logs (mounted as an
          # emptyDir below); SQLite/`/app/data` is embedded-mode only.
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
          ports:
            - name: http
              containerPort: 8000
              protocol: TCP
            - name: metrics
              containerPort: 9100
              protocol: TCP
          env:
            - name: MCP_CONFIG
              value: /app/config.yaml
            - name: MCP_GATEWAY_API_KEY
              valueFrom:
                secretKeyRef:
                  name: gateway-secrets
                  key: api-key
                  optional: true
            - name: MCP_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: gateway-secrets
                  key: secret-key
                  optional: true
            # Authenticated Redis URL incl. password (Tier-0 F-24), e.g.
            # redis://:<password>@redis:6379/0 (or rediss://… for TLS). Kept in the
            # secret so the password isn't in the manifest. The gateway refuses to
            # start against an unauthenticated Redis unless redis.allow_insecure: true.
            - name: MCP_REDIS_URL
              valueFrom:
                secretKeyRef:
                  name: gateway-secrets
                  key: redis-url
            - name: GATEWAY_ID
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
          volumeMounts:
            - name: config
              mountPath: /app/config.yaml
              subPath: config.yaml
              readOnly: true
            # Writable log dir — required because the root filesystem is read-only.
            # emptyDir is ephemeral (lost on restart); ship logs to a collector
            # (see docs/observability.md) for durability.
            - name: logs
              mountPath: /app/logs
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
          # Liveness uses /livez (F-17): a no-I/O check that the event loop is
          # turning. /health does Redis/registry work (it's really readiness) and a
          # gateway whose loop is wedged can keep serving cached responses — /livez
          # catches that "wedged-but-serving" case; a wedged loop also can't answer
          # the probe, so it fails either way. Restart the pod on a stalled loop.
          livenessProbe:
            httpGet:
              path: /livez
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /readyz
              port: 8000
            initialDelaySeconds: 5
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 3
      volumes:
        - name: config
          configMap:
            name: gateway-config
        - name: logs
          emptyDir: {}
