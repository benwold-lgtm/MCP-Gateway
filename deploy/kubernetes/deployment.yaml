apiVersion: apps/v1
kind: Deployment
metadata:
  name: device-mcp-gateway
  namespace: mcp-gateway
  labels:
    app.kubernetes.io/name: device-mcp-gateway
spec:
  # Gateway is stateless in distributed mode — scale freely.
  # Set registry.mode = "distributed" in configmap.yaml to enable.
  # In embedded mode keep replicas: 1 (in-process pods, no shared state).
  replicas: 1
  selector:
    matchLabels:
      app: device-mcp-gateway
  template:
    metadata:
      labels:
        app: device-mcp-gateway
    spec:
      # Give SSE streams time to drain before the pod is forcibly killed.
      # Adjust upward if clients hold very long-lived connections.
      terminationGracePeriodSeconds: 120
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
      containers:
        - name: gateway
          # Pin to an immutable digest or semantic tag in production — never ship :latest.
          # Example: ghcr.io/your-org/device-mcp-gateway:1.2.3
          image: device-mcp-gateway:latest
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8000
              protocol: TCP
          env:
            - name: MCP_CONFIG
              value: /app/config.yaml
            - name: MCP_GATEWAY_API_KEY
              valueFrom:
                secretKeyRef:
                  name: gateway-secrets
                  key: api-key
                  optional: true
            - name: MCP_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: gateway-secrets
                  key: secret-key
                  optional: true
            - name: MCP_REDIS_URL
              value: redis://redis:6379/0
            - name: GATEWAY_ID
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
          volumeMounts:
            - name: config
              mountPath: /app/config.yaml
              subPath: config.yaml
              readOnly: true
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /readyz
              port: 8000
            initialDelaySeconds: 5
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 3
      volumes:
        - name: config
          configMap:
            name: gateway-config
