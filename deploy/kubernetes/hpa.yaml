# HorizontalPodAutoscalers for distributed mode.
#
# Gateway and worker scale independently. Gateway scales on CPU (a proxy for
# request/SSE load). Worker scales on CPU too by default; the ideal worker
# signal is Redis Stream consumer lag on device:*:calls, now exported by the
# worker as the `mcp_worker_pending_calls` gauge on the metrics port (:9100).
# Wiring it to the HPA still requires a custom-metrics adapter
# (prometheus-adapter / KEDA) — see the commented block.
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: device-mcp-gateway
  namespace: mcp-gateway
  labels:
    app.kubernetes.io/name: device-mcp-gateway
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: device-mcp-gateway
  minReplicas: 2
  maxReplicas: 10
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
  behavior:
    scaleDown:
      stabilizationWindowSeconds: 300
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: device-mcp-worker
  namespace: mcp-gateway
  labels:
    app.kubernetes.io/name: device-mcp-worker
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: device-mcp-worker
  minReplicas: 2
  maxReplicas: 10
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
    # Preferred: scale on Redis Stream lag (requires a custom-metrics adapter
    # exposing the worker's mcp_worker_pending_calls gauge as an external metric).
    # - type: External
    #   external:
    #     metric:
    #       name: mcp_worker_pending_calls
    #     target:
    #       type: AverageValue
    #       averageValue: "100"
  behavior:
    scaleDown:
      stabilizationWindowSeconds: 300
