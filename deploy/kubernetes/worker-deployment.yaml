---
# Worker Deployment — hosts DevicePods and executes tool calls.
# Scale independently of the gateway. Each replica gets a unique WORKER_ID
# via the pod name (injected via the Downward API).
apiVersion: apps/v1
kind: Deployment
metadata:
  name: device-mcp-worker
  namespace: mcp-gateway
spec:
  replicas: 2
  selector:
    matchLabels:
      app: device-mcp-worker
  template:
    metadata:
      labels:
        app: device-mcp-worker
      annotations:
        # Workers expose Prometheus on the dedicated metrics port (the worker
        # HPA's redis-stream-lag signal — mcp_worker_pending_calls — lives here).
        prometheus.io/scrape: "true"
        prometheus.io/port: "9100"
        prometheus.io/path: /metrics
    spec:
      # 120s matches the gateway. Workers make outbound tool calls (15s httpx timeout)
      # and need time to finish in-flight calls, drain the Redis Stream consumer, and
      # unregister from workers:active before the pod is forcibly killed. On
      # SIGTERM the worker stops consuming and drains in-flight tool calls (up to
      # registry.shutdown_drain_timeout) before tearing down pods (SRE #6); keep
      # this grace period comfortably above that drain timeout.
      terminationGracePeriodSeconds: 120
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
      containers:
        - name: worker
          # Pin to an immutable digest or semantic tag in production — never ship :latest
          image: device-mcp-gateway:latest
          command: ["device-mcp-worker"]
          ports:
            - name: metrics
              containerPort: 9100
              protocol: TCP
          lifecycle:
            preStop:
              exec:
                # Give Kubernetes time to remove this pod from any routing layer
                # before SIGTERM fires, preventing new assignments during shutdown.
                command: ["/bin/sh", "-c", "sleep 5"]
          env:
            - name: MCP_CONFIG
              value: /app/config.yaml
            - name: MCP_GATEWAY_API_KEY
              valueFrom:
                secretKeyRef:
                  name: gateway-secrets
                  key: api-key
                  optional: true
            - name: MCP_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: gateway-secrets
                  key: secret-key
                  optional: true
            - name: MCP_REDIS_URL
              value: redis://redis:6379/0
            # Use the pod name as WORKER_ID for uniqueness across replicas
            - name: WORKER_ID
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
          volumeMounts:
            - name: config
              mountPath: /app/config.yaml
              subPath: config.yaml
              readOnly: true
          resources:
            requests:
              cpu: "200m"
              memory: "256Mi"
            limits:
              cpu: "1000m"
              memory: "1Gi"
          # Workers have no HTTP port; use exec probes via Redis heartbeat key.
          # The heartbeat key is set by the worker's heartbeat loop with TTL =
          # 2 × health_check_interval. A missing key means the loop has stalled.
          livenessProbe:
            exec:
              command:
                - python
                - -c
                - |
                  import os, sys, redis as r
                  client = r.from_url(
                      os.environ.get("MCP_REDIS_URL", "redis://redis:6379/0"),
                      socket_connect_timeout=3,
                  )
                  key = f"worker:{os.environ.get('WORKER_ID', 'unknown')}:heartbeat"
                  sys.exit(0 if client.exists(key) else 1)
            # Allow time for: Python startup + Redis connect + first heartbeat write.
            initialDelaySeconds: 60
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 3
      volumes:
        - name: config
          configMap:
            name: gateway-config
