---
# Worker Deployment — hosts DevicePods and executes tool calls.
# Scale independently of the gateway. Each replica gets a unique WORKER_ID
# via the pod name (injected via the Downward API).
apiVersion: apps/v1
kind: Deployment
metadata:
  name: device-mcp-worker
  namespace: mcp-gateway
spec:
  replicas: 2
  selector:
    matchLabels:
      app: device-mcp-worker
  template:
    metadata:
      labels:
        app: device-mcp-worker
      annotations:
        # Workers expose Prometheus on the dedicated metrics port (the worker
        # HPA's redis-stream-lag signal — mcp_worker_pending_calls — lives here).
        prometheus.io/scrape: "true"
        prometheus.io/port: "9100"
        prometheus.io/path: /metrics
    spec:
      # 120s matches the gateway. Workers make outbound tool calls (15s httpx timeout)
      # and need time to finish in-flight calls, drain the Redis Stream consumer, and
      # unregister from workers:active before the pod is forcibly killed. On
      # SIGTERM the worker stops consuming and drains in-flight tool calls (up to
      # registry.shutdown_drain_timeout) before tearing down pods (SRE #6); keep
      # this grace period comfortably above that drain timeout.
      terminationGracePeriodSeconds: 120
      # Spread workers across nodes so a single node failure drops at most one
      # worker (the PDB keeps minAvailable: 1; surviving workers reclaim the
      # evicted worker's devices via lease lapse + XAUTOCLAIM). "preferred" so it
      # won't block scheduling on a small/single-node test cluster.
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchLabels:
                    app: device-mcp-worker
                topologyKey: kubernetes.io/hostname
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: worker
          # Pin to an immutable digest or semantic tag in production — never ship :latest
          image: device-mcp-gateway:latest
          command: ["device-mcp-worker"]
          # Container hardening. readOnlyRootFilesystem is safe because the worker
          # writes only to /app/logs and to its liveness file under /tmp — both
          # mounted as emptyDir volumes below.
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
          ports:
            - name: metrics
              containerPort: 9100
              protocol: TCP
          lifecycle:
            preStop:
              exec:
                # Give Kubernetes time to remove this pod from any routing layer
                # before SIGTERM fires, preventing new assignments during shutdown.
                command: ["/bin/sh", "-c", "sleep 5"]
          env:
            - name: MCP_CONFIG
              value: /app/config.yaml
            - name: MCP_GATEWAY_API_KEY
              valueFrom:
                secretKeyRef:
                  name: gateway-secrets
                  key: api-key
                  optional: true
            - name: MCP_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: gateway-secrets
                  key: secret-key
                  optional: true
            # Authenticated Redis URL incl. password (Tier-0 F-24) — see deployment.yaml.
            # The worker refuses to start against an unauthenticated Redis unless
            # redis.allow_insecure: true.
            - name: MCP_REDIS_URL
              valueFrom:
                secretKeyRef:
                  name: gateway-secrets
                  key: redis-url
            # Use the pod name as WORKER_ID for uniqueness across replicas
            - name: WORKER_ID
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
          volumeMounts:
            - name: config
              mountPath: /app/config.yaml
              subPath: config.yaml
              readOnly: true
            # Writable log dir (root filesystem is read-only). emptyDir is
            # ephemeral — ship logs to a collector for durability.
            - name: logs
              mountPath: /app/logs
            # Writable /tmp for the liveness file (registry.liveness_file default:
            # <tempdir>/mcp-worker-alive — i.e. /tmp/mcp-worker-alive, which the
            # liveness probe below checks). Required under readOnlyRootFilesystem.
            - name: tmp
              mountPath: /tmp
          resources:
            requests:
              cpu: "200m"
              memory: "256Mi"
            limits:
              cpu: "1000m"
              memory: "1Gi"
          # Workers have no HTTP port. The heartbeat loop touches a local liveness
          # file (mtime) on every HEALTHY beat and withholds it when its critical
          # loops have stalled, so file freshness mirrors worker liveness (F-17).
          # This replaces the old probe that spawned a Python interpreter AND opened
          # a fresh Redis connection every period, per worker — heavyweight and a
          # failure source of its own under Redis stress. `find -mmin -2` flags the
          # file as fresh only if touched in the last 2 min (> heartbeat interval);
          # a stale or missing file → no match → exit 1 → probe fails.
          # NOTE: the path must match registry.liveness_file (default: the system
          # temp dir + /mcp-worker-alive). Update both together if you override it.
          livenessProbe:
            exec:
              command:
                - /bin/sh
                - -c
                - find /tmp/mcp-worker-alive -mmin -2 | grep -q .
            # Allow time for: process startup + first healthy heartbeat write.
            initialDelaySeconds: 60
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 3
      volumes:
        - name: config
          configMap:
            name: gateway-config
        - name: logs
          emptyDir: {}
        - name: tmp
          emptyDir: {}
