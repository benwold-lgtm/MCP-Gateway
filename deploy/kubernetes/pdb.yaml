---
# PodDisruptionBudgets — protect availability during node drains and rolling updates.
#
# Gateway PDB: ensures at least 1 gateway replica continues serving requests
# during a voluntary disruption (node drain, cluster upgrade). With replicas ≥ 2
# (distributed mode), rolling updates proceed normally. With replicas = 1
# (embedded mode), this intentionally blocks voluntary eviction to protect the
# only serving instance — operators must scale to 0 before draining.
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: device-mcp-gateway-pdb
  namespace: mcp-gateway
spec:
  minAvailable: 1
  selector:
    matchLabels:
      app: device-mcp-gateway
---
# Worker PDB: ensures at least 1 worker remains available to service tool calls
# and health checks. When a worker is evicted, its per-device claim leases lapse;
# the leader-elected reconciler then republishes those devices' assignments to a
# surviving worker, and in-flight calls are recovered via Redis Stream XAUTOCLAIM.
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: device-mcp-worker-pdb
  namespace: mcp-gateway
spec:
  minAvailable: 1
  selector:
    matchLabels:
      app: device-mcp-worker
