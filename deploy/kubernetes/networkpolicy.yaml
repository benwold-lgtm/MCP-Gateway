---
# Gateway NetworkPolicy — restricts ingress and egress for gateway pods.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: device-mcp-gateway
  namespace: mcp-gateway
spec:
  podSelector:
    matchLabels:
      app: device-mcp-gateway
  policyTypes:
    - Ingress
    - Egress

  ingress:
    - ports:
        - port: 8000
          protocol: TCP

  egress:
    - ports:
        - port: 53
          protocol: UDP
        - port: 53
          protocol: TCP
    # Redis (shared state)
    - ports:
        - port: 6379
          protocol: TCP
    # Downstream device APIs
    - ports:
        - port: 80
          protocol: TCP
        - port: 443
          protocol: TCP
        - port: 8080
          protocol: TCP
        - port: 8443
          protocol: TCP

---
# Worker NetworkPolicy — workers need Redis + downstream device API access.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: device-mcp-worker
  namespace: mcp-gateway
spec:
  podSelector:
    matchLabels:
      app: device-mcp-worker
  policyTypes:
    - Ingress
    - Egress

  ingress: []  # Workers accept no inbound connections

  egress:
    - ports:
        - port: 53
          protocol: UDP
        - port: 53
          protocol: TCP
    # Redis (shared state + tool call streams)
    - ports:
        - port: 6379
          protocol: TCP
    # Downstream device APIs
    - ports:
        - port: 80
          protocol: TCP
        - port: 443
          protocol: TCP
        - port: 8080
          protocol: TCP
        - port: 8443
          protocol: TCP

---
# Redis NetworkPolicy — Redis only accepts connections from gateway/worker pods.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: redis
  namespace: mcp-gateway
spec:
  podSelector:
    matchLabels:
      app: redis
  policyTypes:
    - Ingress

  ingress:
    - from:
        - podSelector:
            matchLabels:
              app: device-mcp-gateway
        - podSelector:
            matchLabels:
              app: device-mcp-worker
      ports:
        - port: 6379
          protocol: TCP
