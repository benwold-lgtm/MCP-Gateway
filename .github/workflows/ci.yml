name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Check formatting (black)
        run: black --check .

      - name: Lint (flake8)
        run: flake8 device_mcp_gateway/ tests/ --max-line-length=120

      - name: Type check (mypy)
        run: mypy device_mcp_gateway/ --ignore-missing-imports --no-strict-optional

      - name: Run tests
        run: pytest tests/ -v
