services:
  # ---------------------------------------------------------------------------
  # Redis — shared state for distributed mode
  # ---------------------------------------------------------------------------
  redis:
    image: redis:7-alpine
    ports:
      # Expose to host for development tooling (redis-insight, redis-cli).
      # Remove this port mapping in production to limit external exposure.
      - "6379:6379"
    command: redis-server --appendonly yes
    volumes:
      - redis-data:/data
    networks:
      - mcp-net
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 256M
        reservations:
          cpus: "0.1"
          memory: 64M

  # ---------------------------------------------------------------------------
  # Gateway — stateless HTTP/SSE API server (scale freely)
  # NOTE: the fixed host port below means `--scale gateway=N` will fail with a
  # port conflict. For multi-replica gateways use Kubernetes (deploy/kubernetes,
  # with the gateway HPA) or front several gateway containers with a load
  # balancer. Workers scale freely (they publish no host port).
  # ---------------------------------------------------------------------------
  gateway:
    build: .
    ports:
      - "8000:8000"
    volumes:
      - ./config.yaml:/app/config.yaml:ro
    networks:
      - mcp-net
    environment:
      - MCP_CONFIG=/app/config.yaml
      - MCP_REGISTRY_MODE=distributed
      - MCP_GATEWAY_API_KEY=${MCP_GATEWAY_API_KEY:-}
      - MCP_SECRET_KEY=${MCP_SECRET_KEY:-}
      - MCP_REDIS_URL=redis://redis:6379/0
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped
    deploy:
      resources:
        limits:
          # Tune upward for high SSE connection counts or many concurrent devices.
          cpus: "1.0"
          memory: 512M
        reservations:
          cpus: "0.25"
          memory: 128M

  # ---------------------------------------------------------------------------
  # Worker — hosts DevicePods, executes tool calls (scale independently)
  # Scale horizontally: docker compose up --scale worker=3
  # ---------------------------------------------------------------------------
  worker:
    build: .
    command: ["device-mcp-worker", "--config", "/app/config.yaml"]
    volumes:
      - ./config.yaml:/app/config.yaml:ro
    networks:
      - mcp-net
    environment:
      - MCP_CONFIG=/app/config.yaml
      - MCP_REGISTRY_MODE=distributed
      - MCP_GATEWAY_API_KEY=${MCP_GATEWAY_API_KEY:-}
      - MCP_SECRET_KEY=${MCP_SECRET_KEY:-}
      - MCP_REDIS_URL=redis://redis:6379/0
      - WORKER_ID=${WORKER_ID:-worker-1}
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped
    deploy:
      resources:
        limits:
          # Workers make outbound HTTP calls to device APIs and run one asyncio task
          # per assigned device. Tune cpus/memory based on device count per worker.
          cpus: "2.0"
          memory: 1G
        reservations:
          cpus: "0.5"
          memory: 256M

networks:
  mcp-net:
    driver: bridge

volumes:
  redis-data:
