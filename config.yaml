# Device MCP Gateway Configuration

gateway:
  # Require Authorization: Bearer <token> on all API routes (leave empty to disable).
  # Override with MCP_GATEWAY_API_KEY environment variable. This single key maps to
  # the "admin" role (full access) — today's behaviour, unchanged.
  api_key: ""
  # Scoped API keys (RBAC). Each key maps to a role; routes authorize on scopes:
  #   admin  → devices:read, devices:write, tools:call, metrics:read (full access)
  #   viewer → devices:read, metrics:read (read-only; no device mutation or tool calls)
  # `name` becomes the audit-log subject ("key:<name>"). Env shortcuts also exist:
  # MCP_ADMIN_KEY and MCP_VIEWER_KEY. If no keys are set anywhere, auth is disabled.
  # In DISTRIBUTED mode the gateway refuses to start with auth disabled (no keys ⇒ every
  # request is ANONYMOUS with full access). For a trusted local network only, set
  # allow_anonymous: true to override. Embedded mode keeps the permissive single-operator default.
  allow_anonymous: false
  # rbac:
  #   - name: ops-dashboard
  #     key: "change-me-viewer-token"
  #     role: viewer
  #   - name: admin-cli
  #     key: "change-me-admin-token"
  #     role: admin
  # Fernet key for encrypting device credentials in SQLite.
  # Generate: python -c "from cryptography.fernet import Fernet; print(Fernet.generate_key().decode())"
  # Override with MCP_SECRET_KEY environment variable.
  # Leave empty to store credentials as plaintext (not recommended for production).
  secret_key: ""
  # Distributed mode persists device credentials to Redis. By default the gateway
  # and workers REFUSE to start in distributed mode without a secret_key so
  # credentials are never written in plaintext. Set true to override (dev only).
  allow_plaintext_credentials: false
  # Maximum POST/PUT request body size in bytes (default 1 MB). Requests exceeding this return 413.
  max_body_bytes: 1048576
  # Seconds to cache the /admin/overview read aggregate per replica, so a polling
  # UI dashboard doesn't trigger a fresh device list on every request. The response
  # carries an ETag for conditional (304) requests. Set 0 to disable caching.
  read_cache_ttl: 5
  # Trust X-Forwarded-For for the rate-limiter client IP. Enable ONLY when the
  # gateway sits behind a trusted proxy/ingress that sets this header, otherwise
  # clients can spoof it. When false, the limiter keys on the socket peer IP.
  # In distributed mode rate limits are shared across replicas via Redis
  # automatically; in embedded mode they are per-process.
  trust_proxy_headers: false

server:
  # 0.0.0.0 binds all interfaces (intended for containers behind a network policy/LB).
  # The gateway warns at startup if it binds all interfaces while auth is disabled —
  # bind 127.0.0.1 for a local-only process, or configure auth (see gateway.api_key).
  host: "0.0.0.0"
  port: 8000

registry:
  # "embedded": in-process pods, SQLite, no Redis required (default, local dev)
  # "distributed": Redis-backed registry + separate worker processes (production)
  # Override with the MCP_REGISTRY_MODE environment variable. The gateway and
  # workers must agree on this; a worker refuses to start unless it resolves to
  # "distributed".
  mode: "embedded"
  # How often to poll device reachability (seconds)
  health_check_interval: 30
  # How often to check for spec version updates
  spec_poll_interval: 300
  # Spec cache TTL in seconds
  spec_cache_ttl: 3600
  # Distributed mode: seconds the gateway waits for a worker to handle a tool
  # call before emitting a timeout error event on the SSE stream, so clients
  # don't hang forever when no worker is consuming.
  tool_call_timeout: 30
  # Distributed mode: how often the leader-elected reconciler sweeps for orphaned
  # devices (claim lease lapsed because the owning worker died) and republishes
  # their assignments so a live worker takes over. One worker leads at a time.
  reconcile_interval: 30
  # Distributed mode: max concurrent in-flight tool calls a worker runs per device.
  # When saturated the worker stops reading that device's call stream (backpressure),
  # so a burst shows up as Redis-stream lag rather than unbounded worker memory.
  max_concurrent_calls_per_device: 20
  # Distributed mode: on SIGTERM, seconds to let in-flight tool calls finish before
  # cancelling them. Keep below the pod terminationGracePeriodSeconds.
  shutdown_drain_timeout: 25
  # Per-device health-check lock TTL in seconds (distributed mode). Must exceed
  # the worst-case single check (reachability + spec fetch + translation) so a
  # slow check can't let the lock expire and a second worker double-check the
  # same device. Defaults to max(2 × health_check_interval, 120) when unset.
  # health_lock_ttl: 120
  # Max pods to run concurrently (embedded mode only)
  max_concurrent_pods: 50
  # Bounded retries with full-jitter backoff on IDEMPOTENT outbound calls only —
  # GET tool calls, reachability and spec/discovery fetches (F-05). POST/PUT/PATCH/
  # DELETE are never auto-retried (a timed-out mutation may already have applied).
  # On a 429 the upstream's Retry-After is honored, capped at retry_max_delay; if it
  # asks for longer, the 429 is surfaced instead of holding the call open (F-44).
  # Keep the budget small so a struggling upstream isn't amplified.
  max_retries: 2
  retry_base_delay: 0.2
  retry_max_delay: 5.0

redis:
  # Redis connection URL. Used when registry.mode = "distributed".
  # Override with MCP_REDIS_URL environment variable.
  # Redis is the entire distributed control plane (registry, tool-call streams, claims,
  # leader locks). Distributed mode REQUIRES an authenticated Redis: the URL must carry a
  # password — redis://:<password>@host:6379/0 — and ideally TLS (rediss://...). The gateway
  # and workers refuse to start against an unauthenticated Redis. For a trusted local network
  # only, set allow_insecure: true to override.
  url: "redis://localhost:6379/0"
  allow_insecure: false
  socket_timeout: 5
  # Command connection pool size per gateway/worker process.
  max_connections: 20
  # Separate pool for SSE pub/sub subscriptions. Each open SSE stream holds one
  # connection for its lifetime, so this caps concurrent SSE clients per gateway
  # replica — size it to your expected concurrency (not shared with commands).
  pubsub_max_connections: 1000

auth:
  # Default auth type (api_key or oauth2)
  type: "api_key"
  
  # API Key mode settings
  api_key:
    header_name: "X-API-Key"
    
  # OAuth2 mode settings
  oauth2:
    token_endpoint: ""
    client_id: ""
    client_secret: ""
    scopes:
      - "read"
      - "write"
      
transport:
  # SSE is the only supported gateway transport.
  default: "sse"
  sse:
    # Seconds between keep-alive pings when the SSE queue is idle.
    keep_alive_interval: 15

discovery:
  # Common OpenAPI spec paths to try when auto-discovering
  spec_paths:
    - "/openapi.json"
    - "/openapi.yaml"
    - "/swagger.json" 
    - "/swagger.yaml"
    - "/api-docs"
    - "/docs/openapi.json"
    - "/openapi/3.0.json"
    - "/api/v1/openapi.json"
  # Timeout for discovery requests (seconds)
  timeout: 10

storage:
  # Persistence backend: sqlite
  type: "sqlite"
  # Path to the SQLite database file
  db_path: "./data/devices.db"

cors:
  # Allowed origins for browser-based MCP clients. Empty list disables CORS headers (safe default).
  # Credentials are allowed, so a "*" wildcard lets ANY website call the API from a browser —
  # the gateway warns at startup if you set it. Use ["*"] only in local development; set specific
  # origins in production. Example: ["https://my-llm-app.example.com", "https://app.anthropic.com"]
  allowed_origins: []

security:
  # SSRF policy (Tier-0 F-02): device base_url/spec_url are fetched server-side, so by
  # default the gateway refuses targets that resolve to internal/loopback/link-local/
  # private addresses (e.g. cloud metadata 169.254.169.254). Set true ONLY for a trusted
  # internal device fleet where devices legitimately live on private addresses.
  # Env override: MCP_ALLOW_PRIVATE_TARGETS=true.
  allow_private_targets: false

metrics:
  # Prometheus exposition is served on a DEDICATED port, separate from the API
  # port — point a ServiceMonitor / scrape config at this port (named "metrics"),
  # and restrict it with a NetworkPolicy rather than exposing it via the API LB.
  # Run one process per pod (scale via replicas); no multiprocess mode required.
  enabled: true
  # Metrics port (env MCP_METRICS_PORT overrides). Workers reuse the same key.
  port: 9100
  # Seconds between device-fleet gauge refreshes (registered/active/reachable).
  gauge_refresh_interval: 15

logging:
  # Log level: DEBUG, INFO, WARNING, ERROR
  level: "INFO"
  # Log file path (rotated; tailed by Fluent Bit / Splunk UF / Promtail)
  file: "logs/gateway.log"
  # Max log file size in MB before rotation
  max_size: 50
  # Number of rotated backup files to retain
  backup_count: 5
  # Emit log file as newline-delimited JSON (recommended for external collectors).
  # Set to false only for local development without an observability stack.
  json_logs: true
